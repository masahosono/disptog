# GitHub Actions: Release
# Creates DMG and publishes release when a tag is pushed
#
# Note: Since tag pushing is restricted to repository owners,
#       there is no risk of external abuse

name: Release

on:
  push:
    tags:
      - 'v*'  # v1.0.0, v1.2.3, etc.

jobs:
  release:
    name: Build & Release
    runs-on: macos-latest
    # Limit concurrent runs
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write  # Required for release creation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Get Version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build
        run: make build

      - name: Create DMG
        run: |
          chmod +x scripts/create-dmg.sh
          ./scripts/create-dmg.sh ${{ steps.version.outputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/dmg/DispTog-${{ steps.version.outputs.version }}.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## DispTog v${{ steps.version.outputs.version }}

            ### Installation
            1. Download the DMG file
            2. Open the DMG and drag DispTog to the Applications folder
            3. Launch DispTog

            ### First Launch
            To use the global shortcut (⌘⇧M), you need to grant permission in System Settings > Privacy & Security > Accessibility.
